name: typforge-prod

services:
  api:
    image: ${TYPFORGE_API_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
      STORAGE_ROOT: /opt/typforge/storage
      TYPST_DOCKER_IMAGE: ${TYPFORGE_TYPST_IMAGE}
      TYPST_ALLOW_NETWORK: ${TYPST_ALLOW_NETWORK:-true}
      TYPST_PACKAGE_CACHE_DIR: /opt/typforge/storage/typst-package-cache
      TYPST_FONT_DIR: /opt/typforge/storage/typst-fonts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/typforge/storage:/opt/typforge/storage
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/typforge/deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: