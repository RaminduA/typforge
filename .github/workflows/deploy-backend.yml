name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "docker/**"
      - "deploy/**"
      - ".github/workflows/deploy-backend.yml"

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    env:
      API_IMAGE: ghcr.io/${{ github.repository_owner }}/typforge-api:${{ github.sha }}
      API_IMAGE_LATEST: ghcr.io/${{ github.repository_owner }}/typforge-api:latest
      TYPST_IMAGE: ghcr.io/${{ github.repository_owner }}/typforge-typst-runner:${{ github.sha }}
      TYPST_IMAGE_LATEST: ghcr.io/${{ github.repository_owner }}/typforge-typst-runner:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest Oracle Terraform state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p infra/oracle

          RUN_ID=$(gh run list \
            --workflow provision-oracle.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            -q '.[0].databaseId')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful Oracle provisioning run found."
            exit 1
          fi

          gh run download "$RUN_ID" \
            --name oracle-terraform-state \
            --dir infra/oracle

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Read Oracle outputs
        id: oracle
        working-directory: infra/oracle
        run: |
          VM_PUBLIC_IP=$(terraform output -raw vm_public_ip)
          GENERATED_API_DOMAIN=$(terraform output -raw api_domain)

          if [ -n "${{ secrets.API_DOMAIN }}" ]; then
            API_DOMAIN="${{ secrets.API_DOMAIN }}"
          else
            API_DOMAIN="$GENERATED_API_DOMAIN"
          fi

          echo "vm_public_ip=$VM_PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "api_domain=$API_DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.API_IMAGE }}
            ${{ env.API_IMAGE_LATEST }}

      - name: Build and push Typst runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/typst-runner/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.TYPST_IMAGE }}
            ${{ env.TYPST_IMAGE_LATEST }}

      - name: Write SSH key
        run: |
          printf '%s\n' "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}" > oracle_ssh_key.pem
          chmod 600 oracle_ssh_key.pem

      - name: Copy deploy files to VM
        run: |
          VM="${{ steps.oracle.outputs.vm_public_ip }}"

          ssh -i oracle_ssh_key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ubuntu@"$VM" \
            "mkdir -p /tmp/typforge-deploy"

          scp -i oracle_ssh_key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            deploy/docker-compose.prod.yml \
            deploy/Caddyfile \
            deploy/deploy-backend.sh \
            ubuntu@"$VM":/tmp/typforge-deploy/

          ssh -i oracle_ssh_key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ubuntu@"$VM" \
            "sudo mkdir -p /opt/typforge/deploy && sudo cp /tmp/typforge-deploy/* /opt/typforge/deploy/ && sudo chmod +x /opt/typforge/deploy/deploy-backend.sh && sudo chown -R ubuntu:ubuntu /opt/typforge"

      - name: Deploy on Oracle VM
        run: |
          VM="${{ steps.oracle.outputs.vm_public_ip }}"
          API_DOMAIN="${{ steps.oracle.outputs.api_domain }}"

          ssh -i oracle_ssh_key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ubuntu@"$VM" \
            "GHCR_USERNAME='${{ github.actor }}' \
             GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' \
             TYPFORGE_API_IMAGE='${{ env.API_IMAGE }}' \
             TYPFORGE_TYPST_IMAGE='${{ env.TYPST_IMAGE }}' \
             API_DOMAIN='${API_DOMAIN}' \
             CORS_ORIGIN='${{ secrets.CORS_ORIGIN }}' \
             ACME_EMAIL='${{ secrets.ACME_EMAIL }}' \
             /opt/typforge/deploy/deploy-backend.sh"

      - name: Health check
        run: |
          API_DOMAIN="${{ steps.oracle.outputs.api_domain }}"

          for i in {1..30}; do
            if curl -fsS "https://${API_DOMAIN}/api/v1/health"; then
              echo "API is healthy."
              exit 0
            fi

            echo "Waiting for API..."
            sleep 10
          done

          echo "API health check failed."
          exit 1