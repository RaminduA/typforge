name: Provision Oracle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/oracle/**"
      - ".github/workflows/provision-oracle.yml"

permissions:
  contents: read
  actions: read

jobs:
  terraform:
    name: Apply Oracle Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/oracle

    env:
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
      TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
      TF_VAR_region: ${{ secrets.OCI_REGION }}
      TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
      TF_VAR_ssh_public_key: ${{ secrets.ORACLE_SSH_PUBLIC_KEY }}
      TF_VAR_private_key_path: ${{ github.workspace }}/infra/oracle/oci_api_key.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore latest Terraform state artifact
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set +e

          echo "Looking for previous oracle-terraform-state artifact..."
          echo "Current run id: ${CURRENT_RUN_ID}"

          RUN_IDS=$(gh run list \
            --workflow provision-oracle.yml \
            --branch main \
            --limit 50 \
            --json databaseId \
            -q '.[].databaseId')

          RESTORED="false"

          for RUN_ID in $RUN_IDS; do
            if [ "$RUN_ID" = "$CURRENT_RUN_ID" ]; then
              echo "Skipping current run: $RUN_ID"
              continue
            fi

            echo "Trying to restore Terraform state from run: $RUN_ID"

            rm -rf /tmp/typforge-terraform-state
            mkdir -p /tmp/typforge-terraform-state

            gh run download "$RUN_ID" \
              --name oracle-terraform-state \
              --dir /tmp/typforge-terraform-state

            if [ $? -eq 0 ]; then
              if [ -f /tmp/typforge-terraform-state/terraform.tfstate ]; then
                cp /tmp/typforge-terraform-state/terraform.tfstate ./terraform.tfstate
                echo "Restored terraform.tfstate from run: $RUN_ID"
                RESTORED="true"
                break
              fi

              if [ -f /tmp/typforge-terraform-state/oracle/terraform.tfstate ]; then
                cp /tmp/typforge-terraform-state/oracle/terraform.tfstate ./terraform.tfstate
                echo "Restored oracle/terraform.tfstate from run: $RUN_ID"
                RESTORED="true"
                break
              fi

              FOUND_STATE=$(find /tmp/typforge-terraform-state -name terraform.tfstate -type f | head -n 1)

              if [ -n "$FOUND_STATE" ]; then
                cp "$FOUND_STATE" ./terraform.tfstate
                echo "Restored Terraform state from: $FOUND_STATE"
                RESTORED="true"
                break
              fi
            fi
          done

          if [ "$RESTORED" != "true" ]; then
            echo "No previous Terraform state artifact found. Starting from empty state."
          fi

          set -e

      - name: Write OCI private key
        run: |
          printf '%s\n' "${{ secrets.OCI_PRIVATE_KEY }}" > oci_api_key.pem
          chmod 600 oci_api_key.pem

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        id: apply
        continue-on-error: true
        run: terraform apply -auto-approve -input=false

      - name: Upload Terraform state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-terraform-state
          path: |
            infra/oracle/terraform.tfstate
            infra/oracle/terraform.tfstate.backup
          if-no-files-found: ignore
          retention-days: 90
          overwrite: true

      - name: Show outputs
        if: steps.apply.outcome == 'success'
        run: terraform output

      - name: Fail if Terraform apply failed
        if: steps.apply.outcome != 'success'
        run: exit 1