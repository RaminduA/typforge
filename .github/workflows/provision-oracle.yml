name: Provision Oracle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/oracle/**"
      - ".github/workflows/provision-oracle.yml"

permissions:
  contents: read
  actions: read

jobs:
  terraform:
    name: Apply Oracle Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/oracle

    env:
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
      TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
      TF_VAR_region: ${{ secrets.OCI_REGION }}
      TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
      TF_VAR_ssh_public_key: ${{ secrets.ORACLE_SSH_PUBLIC_KEY }}
      TF_VAR_private_key_path: ${{ github.workspace }}/infra/oracle/oci_api_key.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore latest Terraform state artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e

          echo "Looking for latest oracle-terraform-state artifact via repository artifacts API..."

          rm -rf /tmp/typforge-terraform-state
          mkdir -p /tmp/typforge-terraform-state

          ARTIFACT_RUN_ID=$(gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts?name=oracle-terraform-state&per_page=100" \
            --jq '.artifacts[] | select(.expired == false) | .workflow_run.id' \
            | head -n 1)

          if [ -z "$ARTIFACT_RUN_ID" ]; then
            echo "No previous oracle-terraform-state artifact found. Starting from empty state."
            set -e
            exit 0
          fi

          echo "Latest oracle-terraform-state artifact belongs to run: ${ARTIFACT_RUN_ID}"

          gh run download "$ARTIFACT_RUN_ID" \
            --name oracle-terraform-state \
            --dir /tmp/typforge-terraform-state

          if [ $? -ne 0 ]; then
            echo "Could not download oracle-terraform-state artifact. Starting from empty state."
            set -e
            exit 0
          fi

          FOUND_STATE=$(find /tmp/typforge-terraform-state -name terraform.tfstate -type f | head -n 1)

          if [ -z "$FOUND_STATE" ]; then
            echo "Artifact downloaded, but terraform.tfstate was not found inside it. Starting from empty state."
            set -e
            exit 0
          fi

          cp "$FOUND_STATE" ./terraform.tfstate
          echo "Restored Terraform state from: $FOUND_STATE"

          set -e

      - name: Write OCI private key
        run: |
          printf '%s\n' "${{ secrets.OCI_PRIVATE_KEY }}" > oci_api_key.pem
          chmod 600 oci_api_key.pem

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        id: apply
        continue-on-error: true
        run: terraform apply -auto-approve -input=false

      - name: Upload Terraform state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-terraform-state
          path: |
            infra/oracle/terraform.tfstate
            infra/oracle/terraform.tfstate.backup
          if-no-files-found: ignore
          retention-days: 90
          overwrite: true

      - name: Show outputs
        if: steps.apply.outcome == 'success'
        run: terraform output

      - name: Fail if Terraform apply failed
        if: steps.apply.outcome != 'success'
        run: exit 1