name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  API_IMAGE: ghcr.io/ramindua/typforge-api
  NEXT_PUBLIC_API_BASE_URL: https://typforge-api.onrender.com/api/v1

jobs:
  api-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: apps/api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/server

  web-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: |
          if [ -f apps/web/package-lock.json ]; then
            npm ci --prefix apps/web
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install --prefix apps/web
          fi

      - name: Build frontend
        run: |
          if npm --prefix apps/web run | grep -q " build"; then
            npm --prefix apps/web run build
          else
            npm run web:build
          fi

  deploy-api:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs:
      - api-ci
      - web-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

  deploy-web:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs:
      - api-ci
      - web-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd apps/web

      - name: Build Vercel project
        run: vercel build --prod --token="$VERCEL_TOKEN" --cwd apps/web

      - name: Deploy Vercel project
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --cwd apps/web