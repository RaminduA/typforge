#cloud-config

package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - docker.io
  - docker-compose-plugin
  - git
  - unzip

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ${deploy_user}
  - mkdir -p /opt/typforge/deploy
  - mkdir -p /opt/typforge/storage/projects
  - mkdir -p /opt/typforge/storage/builds
  - mkdir -p /opt/typforge/storage/typst-fonts
  - mkdir -p /opt/typforge/storage/typst-package-cache
  - chown -R ${deploy_user}:${deploy_user} /opt/typforge
  - chmod -R 775 /opt/typforge
  - |
    if [ ! -f /swapfile ]; then
      fallocate -l 2G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=2048
      chmod 600 /swapfile
      mkswap /swapfile
      swapon /swapfile
      echo '/swapfile none swap sw 0 0' >> /etc/fstab
    fi