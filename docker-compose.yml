name: typforge-dev

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: typforge/api:local
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      STORAGE_DRIVER: filesystem
      STORAGE_ROOT: /tmp/typforge/storage

      TYPST_COMPILER: binary
      TYPST_BIN: /usr/local/bin/typst
      TYPST_PACKAGE_CACHE_DIR: /tmp/typforge/typst-package-cache
      TYPST_FONT_DIR: /tmp/typforge/typst-fonts
      COMPILE_TIMEOUT_SECONDS: "60"

      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./storage:/tmp/typforge/storage